<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Kelas Online</title>

    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4 font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600 tracking-tight">Kelas Online</h1>
            <p class="text-slate-500 text-sm mt-2">Silakan login untuk mengakses materi & checklist harian</p>
        </div>

        <!-- Form Login -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Email / Username</label>
                <input type="text" id="username" required 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm" 
                    placeholder="Masukkan email Anda">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm" 
                    placeholder="••••••••">
            </div>

            <!-- Tombol Login -->
            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl shadow-md transition-colors text-sm cursor-pointer">
                Masuk ke Kelas
            </button>
        </form>

        <!-- Footer -->
        <p class="text-center text-xs text-slate-400 mt-8">
            Butuh bantuan akses? Hubungi Admin via WhatsApp
        </p>
    </div>

    <!-- Logika JavaScript Dasar -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah halaman reload otomatis
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Simulasi Login Sederhana (Nanti bisa dihubungkan ke Firebase/Supabase)
            if(user === "murid@kelas.com" && pass === "rahasia123") {
                alert("Login Berhasil! Mengalihkan ke Dashboard...");
                window.location.href = "dashboard.html";

            } else {
                alert("Email atau Password salah! Coba: murid@kelas.com / rahasia123");
            }
        });
    </script>
</body>
</html>
